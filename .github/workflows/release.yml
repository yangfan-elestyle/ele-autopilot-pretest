name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify tag matches package.json version
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag="${{ github.ref_name }}"
          if [ "v${pkg_version}" != "${tag}" ]; then
            echo "error: tag ${tag} does not match package.json version v${pkg_version}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Assemble release bundle
        run: |
          set -euo pipefail
          BUNDLE_DIR="ele-autopilot-${GITHUB_REF_NAME}-linux-x64"
          mkdir -p "$BUNDLE_DIR"
          cp -a .next/standalone/. "$BUNDLE_DIR/"
          mkdir -p "$BUNDLE_DIR/.next/static"
          cp -a .next/static/. "$BUNDLE_DIR/.next/static/"
          if [ -d public ]; then
            mkdir -p "$BUNDLE_DIR/public"
            cp -a public/. "$BUNDLE_DIR/public/"
          fi
          tar -czf "$BUNDLE_DIR.tar.gz" "$BUNDLE_DIR"
          sha256sum "$BUNDLE_DIR.tar.gz" > checksums.txt
          ls -lh "$BUNDLE_DIR.tar.gz"
          cat checksums.txt
          echo "BUNDLE_TARBALL=$BUNDLE_DIR.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BUNDLE_TARBALL }}
            checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
